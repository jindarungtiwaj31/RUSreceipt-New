<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RUSreceipt-New | ระบบออกใบเสร็จรับเงิน</title>
  <meta name="description" content="ระบบออกใบเสร็จรับเงิน RUSreceipt-New สำหรับ Admin/User พร้อมฐานข้อมูลกลาง Firebase" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="toast" class="toast hidden"></div>

  <main id="loginScreen" class="login-screen">
    <section class="login-card">
      <div class="brand-lockup">
        <div class="brand-logo">RUS</div>
        <div>
          <p class="eyebrow">RUSreceipt-New</p>
          <h1>ระบบออกใบเสร็จรับเงิน</h1>
          <p class="muted">มหาวิทยาลัยเทคโนโลยีราชมงคลสุวรรณภูมิ</p>
        </div>
      </div>

      <div class="mode-tabs" role="tablist" aria-label="โหมดเข้าสู่ระบบ">
        <button class="tab active" data-login-tab="admin">Admin</button>
        <button class="tab" data-login-tab="user">User</button>
      </div>

      <form id="adminLoginForm" class="login-form">
        <label>Username</label>
        <input id="adminUsername" autocomplete="username" value="admin" />
        <label>Password</label>
        <input id="adminPassword" type="password" autocomplete="current-password" value="admin123" />
        <button class="primary" type="submit">เข้าสู่ระบบ Admin</button>
      </form>

      <form id="userLoginForm" class="login-form hidden">
        <label>รหัส User 4 หลัก</label>
        <input id="userCode" inputmode="numeric" maxlength="4" placeholder="เช่น 1234" />
        <button class="primary" type="submit">เข้าสู่ระบบ User</button>
        <p class="hint">Admin ต้องสร้าง User ก่อนใช้งาน</p>
      </form>

      <div class="login-footer">
        <span id="dbBadge" class="badge local">Local DB</span>
        <span class="hint">ค่าเริ่มต้น Admin: admin / admin123</span>
      </div>
    </section>
  </main>

  <section id="appShell" class="app-shell hidden">
    <aside class="sidebar">
      <div class="brand-mini">
        <div class="brand-logo small">RUS</div>
        <div>
          <strong>RUSreceipt-New</strong>
          <small id="roleLabel">Admin</small>
        </div>
      </div>
      <nav id="mainNav" class="nav"></nav>
      <button id="logoutBtn" class="ghost danger">ออกจากระบบ</button>
    </aside>

    <div class="workspace">
      <header class="topbar">
        <div>
          <p class="eyebrow" id="pageEyebrow">Dashboard</p>
          <h2 id="pageTitle">ภาพรวมระบบ</h2>
        </div>
        <div class="top-actions">
          <span id="cloudStatus" class="badge local">Local DB</span>
          <button id="quickReceiptBtn" class="secondary">ออกใบเสร็จ</button>
        </div>
      </header>

      <section id="viewRoot" class="view-root"></section>
    </div>
  </section>

  <script src="firebase-config.js"></script>
  <script src="seed-data.js"></script>
  <script src="app-complete.js"></script>
</body>
</html>
